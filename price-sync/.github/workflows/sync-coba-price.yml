name: Sync COBA on-chain price

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - run: npm ci

      - name: setUsdtMicroPerGram from gold spot
        env:
          GOLD_NFT_SYNC_PRIVATE_KEY: ${{ secrets.GOLD_NFT_SYNC_PRIVATE_KEY }}
          GOLD_NFT_CONTRACT: ${{ secrets.GOLD_NFT_CONTRACT }}
          ETHEREUM_RPC_URL: ${{ secrets.ETHEREUM_RPC_URL }}
          METALAPI_KEY: ${{ secrets.METALAPI_KEY }}
        run: npm run sync
