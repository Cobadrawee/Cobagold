# Copy this file to: .github/workflows/sync-gold-nft-price.yml
# (GitHub web: Add file → that path → paste. Or: PAT with "workflow" scope + git add .github/workflows)
name: Sync Gold NFT on-chain price

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - run: npm ci

      - name: Update usdtMicroPerGram on mainnet
        env:
          GOLD_NFT_SYNC_PRIVATE_KEY: ${{ secrets.GOLD_NFT_SYNC_PRIVATE_KEY }}
          GOLD_NFT_CONTRACT: ${{ secrets.GOLD_NFT_CONTRACT }}
          ETHEREUM_RPC_URL: ${{ secrets.ETHEREUM_RPC_URL }}
          METALAPI_KEY: ${{ secrets.METALAPI_KEY }}
          VITE_METALAPI_KEY: ${{ secrets.VITE_METALAPI_KEY }}
        run: node scripts/sync-gold-nft-price.mjs
